<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Recommend · 한국 주식 추천</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="data.js"></script>
<style>
  :root{
    --bg:#0B0F17; --bg-card:#141A24; --bg-soft:#1B232F; --line:#262F3D;
    --ink:#E8EDF4; --ink-soft:#AEB8C7; --ink-faint:#6B7686;
    --green:#2FBF71; --green-bg:#0E2A1C; --red:#F0556B; --red-bg:#2A1218;
    --gold:#E0A65A; --blue:#4D8DF0; --accent:#5BA8FF;
    --font:'Pretendard Variable',Pretendard,-apple-system,'Segoe UI',sans-serif;
    --mono:'IBM Plex Mono','SF Mono',monospace;
  }
  html[data-theme=light]{
    --bg:#F4F6FA; --bg-card:#FFFFFF; --bg-soft:#EEF1F6; --line:#DDE3EC;
    --ink:#16202E; --ink-soft:#41506A; --ink-faint:#8A95A6;
    --green-bg:#E4F6EC; --red-bg:#FCE8EC;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:28px 20px 80px}
  a{color:inherit}
  .view{display:none}.view.active{display:block}

  /* header */
  .brand{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:26px}
  .brand-mark{font-size:22px;font-weight:800;letter-spacing:-.02em}
  .brand-mark .ac{color:var(--accent)}
  .brand-tag{font-size:12px;color:var(--ink-faint);margin-top:3px;letter-spacing:.04em}
  .brand-meta{font-size:12px;color:var(--ink-soft);text-align:right}

  .hero-title{font-size:27px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
  .hero-sub{font-size:13.5px;color:var(--ink-soft);margin-bottom:26px;line-height:1.7}

  .sect{margin-bottom:34px}
  .sect-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .sect-tag{font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;letter-spacing:.03em}
  .sect-tag.buy{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
  .sect-tag.surge{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}
  .sect-title{font-size:18px;font-weight:800}
  .sect-note{font-size:12px;color:var(--ink-faint);margin-left:auto}

  .cards{display:grid;grid-template-columns:1fr;gap:12px}
  .card{text-align:left;width:100%;background:var(--bg-card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;cursor:pointer;transition:all .15s;font-family:inherit;color:inherit;display:grid;grid-template-columns:46px 1fr auto;gap:14px;align-items:center}
  .card:hover{border-color:var(--accent);transform:translateY(-1px)}
  .c-rank{font-family:var(--mono);font-size:22px;font-weight:800;color:var(--ink-faint);text-align:center}
  .card.buy .c-rank{color:var(--green)} .card.surge .c-rank{color:var(--red)}
  .c-name{font-size:17px;font-weight:800}
  .c-mkt{font-size:11px;color:var(--ink-faint);margin-left:7px;font-weight:500}
  .c-line{font-size:12.5px;color:var(--ink-soft);margin-top:4px;line-height:1.5}
  .c-right{text-align:right}
  .c-score{font-family:var(--mono);font-size:21px;font-weight:800}
  .c-tgt{font-size:12px;font-weight:700;margin-top:2px}
  .c-tgt.up{color:var(--green)}
  .c-meta{font-size:10.5px;color:var(--ink-faint);margin-top:2px}

  /* detail */
  .back{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--line);color:var(--ink-soft);border-radius:9px;padding:8px 13px;font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:20px}
  .back:hover{border-color:var(--accent);color:var(--ink)}
  .d-head{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:8px}
  .d-name{font-size:28px;font-weight:800;letter-spacing:-.02em}
  .d-code{font-size:13px;color:var(--ink-faint);font-family:var(--mono)}
  .d-badge{margin-left:auto;text-align:right}
  .d-verdict{display:inline-block;font-size:13px;font-weight:800;padding:6px 14px;border-radius:9px}
  .d-verdict.buy{background:var(--green-bg);color:var(--green)} .d-verdict.surge{background:var(--red-bg);color:var(--red)}
  .d-tgt{font-size:22px;font-weight:800;color:var(--green);margin-top:6px}
  .d-tgt small{font-size:11px;color:var(--ink-faint);font-weight:500;display:block}

  .panel{background:var(--bg-card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px}
  .panel-t{font-size:12px;font-weight:800;color:var(--accent);letter-spacing:.05em;margin-bottom:14px;text-transform:uppercase}

  .axes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .axis .ax-k{font-size:11px;color:var(--ink-faint);font-weight:700;margin-bottom:6px}
  .axis .ax-v{font-size:12.5px;color:var(--ink-soft);line-height:1.55}
  .bar{height:7px;background:var(--bg-soft);border-radius:4px;overflow:hidden;margin:6px 0}
  .bar>i{display:block;height:100%;border-radius:4px}

  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .met{background:var(--bg-card);padding:12px 14px}
  .met .mk{font-size:10.5px;color:var(--ink-faint);font-weight:700;margin-bottom:3px}
  .met .mv{font-size:15px;font-weight:800;font-family:var(--mono)}
  .pos{color:var(--green)} .neg{color:var(--red)}

  .chart-box{height:300px;position:relative}
  .chart-box.vol{height:120px;margin-top:8px}

  ul.cat{list-style:none;display:flex;flex-direction:column;gap:8px}
  ul.cat li{font-size:13px;color:var(--ink-soft);padding-left:20px;position:relative;line-height:1.5}
  ul.cat li:before{content:'🔹';position:absolute;left:0}
  .thesis{font-size:14px;color:var(--ink);line-height:1.75}
  .risk{font-size:13px;color:var(--ink-soft);line-height:1.7;background:var(--red-bg);border-left:3px solid var(--red);padding:12px 16px;border-radius:8px;margin-top:6px}

  /* 매매 가이드 */
  .guide{background:linear-gradient(135deg,var(--bg-card),var(--bg-soft));border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px}
  .guide-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:12px}
  .guide-c{background:var(--bg-card);padding:12px 14px;text-align:center}
  .guide-c .gk{font-size:10.5px;color:var(--ink-faint);font-weight:700;margin-bottom:4px}
  .guide-c .gv{font-size:17px;font-weight:800;font-family:var(--mono)}
  .guide-c .gv.tg{color:var(--green)} .guide-c .gv.sl{color:var(--red)}
  .guide-rule{font-size:13px;color:var(--ink-soft);line-height:1.7;background:var(--bg-soft);border-radius:8px;padding:12px 15px;border-left:3px solid var(--gold)}
  /* 접기/펼치기 */
  .acc{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:10px;background:var(--bg-card)}
  .acc-h{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;color:var(--ink);font-family:inherit;font-size:14px;font-weight:700;padding:15px 18px;cursor:pointer}
  .acc-h:hover{background:var(--bg-soft)}
  .acc-h .ar{margin-left:auto;color:var(--ink-faint);transition:transform .2s;font-size:12px}
  .acc.open .acc-h .ar{transform:rotate(90deg)}
  .acc-b{display:none;padding:0 18px 16px;font-size:13px;color:var(--ink-soft);line-height:1.7}
  .acc.open .acc-b{display:block}
  .acc-h .ic{font-size:15px}
  /* 시나리오 */
  .scn{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:4px}
  .scn-c{border:1px solid var(--line);border-radius:9px;padding:12px}
  .scn-c .st{font-size:11px;font-weight:800;margin-bottom:5px}
  .scn-c.bull .st{color:var(--green)} .scn-c.base .st{color:var(--gold)} .scn-c.bear .st{color:var(--red)}
  .scn-c .sd{font-size:12px;color:var(--ink-soft);line-height:1.5}
  /* 뉴스 */
  ul.news{list-style:none;display:flex;flex-direction:column;gap:2px}
  ul.news li{padding:10px 0;border-bottom:1px dashed var(--line)}
  ul.news li:last-child{border-bottom:none}
  ul.news a{font-size:13.5px;color:var(--ink);text-decoration:none;font-weight:600;line-height:1.5;display:block}
  ul.news a:hover{color:var(--accent)}
  ul.news .nd{font-size:11px;color:var(--ink-faint);margin-top:3px}
  ul.news .ext{color:var(--accent);font-size:11px}

  .disc{font-size:11px;color:var(--ink-faint);line-height:1.7;border-top:1px solid var(--line);padding-top:18px;margin-top:30px}
  .theme-btn{position:fixed;bottom:22px;right:22px;width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:var(--bg-card);color:var(--ink);font-size:18px;cursor:pointer;z-index:50;box-shadow:0 3px 12px rgba(0,0,0,.3)}
  @media(max-width:640px){.axes{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.card{grid-template-columns:38px 1fr auto;gap:10px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="brand">
    <div onclick="showHome()" style="cursor:pointer">
      <div class="brand-mark">Stock<span class="ac">Recommend</span></div>
      <div class="brand-tag">한국 주식 스크리닝 · 추천 엔진</div>
    </div>
    <div class="brand-meta" id="brand-meta">분석일 2026-06-01</div>
  </header>

  <!-- HOME -->
  <section id="view-home" class="view active">
    <h1 class="hero-title">이번 주, 어떤 주식을 살까?</h1>
    <p class="hero-sub">거래량 상위 → 뉴스 모멘텀 → 재무 우량 → 주가 흐름 5단계 스크리닝으로 추린 추천입니다. 카드를 누르면 종목 상세 분석이 열립니다.</p>
    <div class="sect">
      <div class="sect-head"><span class="sect-tag buy">🟢 적극 매수</span><span class="sect-title">1년 내 상승 기대 TOP 5</span><span class="sect-note">저평가 + 펀더멘털 우선</span></div>
      <div class="cards" id="cards-buy"></div>
    </div>
    <div class="sect">
      <div class="sect-head"><span class="sect-tag surge">🚀 급상승 예상</span><span class="sect-title">3개월 내 단기 상승 TOP 5</span><span class="sect-note">모멘텀 + 호재 우선</span></div>
      <div class="cards" id="cards-surge"></div>
    </div>
    <div class="disc" id="disc"></div>
  </section>

  <!-- DETAIL -->
  <section id="view-detail" class="view">
    <button class="back" onclick="showHome()">← 추천 목록으로</button>
    <div id="detail-body"></div>
    <div class="disc" id="disc2"></div>
  </section>
</div>
<button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>

<script>
const DISC = '⚠️ 본 보고서는 공개 데이터(네이버 금융·DART) 기반 정보 제공물이며 투자 권유가 아닙니다. 과거·지연 데이터에 근거하며 실시간 시세와 다를 수 있습니다. 모든 투자 판단과 책임은 이용자 본인에게 있습니다. 자동매매·주문 실행 기능은 없습니다.';
const fmtNum = n => (n==null||n==='')?'-':Number(String(n).replace(/[^\d.\-]/g,'')).toLocaleString();
function pct(v){ if(v==null) return '-'; const c=v>=0?'pos':'neg'; return `<span class="${c}">${v>=0?'+':''}${v}%</span>`; }
function findItem(code,kind){ const lists = kind==='surge' ? [REPORT.surge,REPORT.activeBuy] : [REPORT.activeBuy,REPORT.surge]; for(const l of lists){ const it=l.find(x=>x.code===code); if(it) return it; } return null; }
function toggleAcc(el){ el.parentElement.classList.toggle('open'); }

function showView(id){ document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo({top:0,behavior:'smooth'}); }
function showHome(){ renderHome(); showView('view-home'); }

function card(it, kind, rank){
  return `<button class="card ${kind}" onclick="openStock('${it.code}','${kind}')">
    <div class="c-rank">${rank}</div>
    <div><div class="c-name">${it.name}<span class="c-mkt">${(REPORT.stocks[it.code]||{}).market||''}</span></div>
      <div class="c-line">${it.cat}</div></div>
    <div class="c-right"><div class="c-score">${it.score}</div><div class="c-tgt up">${it.tgt}</div>
      <div class="c-meta">${kind==='buy'?'1년 목표':'3개월 목표'}</div></div>
  </button>`;
}
function renderHome(){
  document.getElementById('cards-buy').innerHTML = REPORT.activeBuy.map((it,i)=>card(it,'buy',i+1)).join('');
  document.getElementById('cards-surge').innerHTML = REPORT.surge.map((it,i)=>card(it,'surge',i+1)).join('');
  document.getElementById('disc').textContent = DISC;
  document.getElementById('brand-meta').textContent = '분석일 '+REPORT.date;
}

let chartP=null, chartV=null, curCode=null, curKind=null;
function acc(icon,title,bodyHtml,open){ return `<div class="acc${open?' open':''}"><button class="acc-h" onclick="toggleAcc(this)"><span class="ic">${icon}</span>${title}<span class="ar">▶</span></button><div class="acc-b">${bodyHtml}</div></div>`; }
function openStock(code, kind){
  curCode=code; curKind=kind;
  const it = findItem(code,kind); const s = REPORT.stocks[code]||{}; const d=it.det||{}; const g=it.guide||{};
  const isBuy = kind==='buy';
  const kLabel = isBuy ? {cls:'buy',txt:'🟢 적극 매수 (1년)'} : {cls:'surge',txt:'🚀 급상승 (3개월)'};
  const metricsHtml = `<div class="metrics">
      <div class="met"><div class="mk">PER</div><div class="mv">${s.per||'-'}</div></div>
      <div class="met"><div class="mk">PBR</div><div class="mv">${s.pbr||'-'}</div></div>
      <div class="met"><div class="mk">영업이익률</div><div class="mv">${s.opMargin!=null?s.opMargin+'%':'-'}</div></div>
      <div class="met"><div class="mk">부채비율</div><div class="mv">${s.debtRatio!=null?s.debtRatio+'%':'-'}</div></div>
      <div class="met"><div class="mk">3개월</div><div class="mv">${pct(s.ret3m)}</div></div>
      <div class="met"><div class="mk">1년</div><div class="mv">${pct(s.ret1y)}</div></div>
      <div class="met"><div class="mk">200일선 대비</div><div class="mv">${pct(s.vsMa200)}</div></div>
      <div class="met"><div class="mk">52주 위치</div><div class="mv">${s.pos52!=null?Math.round(s.pos52*100)+'%':'-'}</div></div>
    </div>`;
  const scn = d.scn||{};
  const scnHtml = `<div class="scn">
      <div class="scn-c bull"><div class="st">▲ 강세 (Bull)</div><div class="sd">${scn.bull||'-'}</div></div>
      <div class="scn-c base"><div class="st">● 기본 (Base)</div><div class="sd">${scn.base||'-'}</div></div>
      <div class="scn-c bear"><div class="st">▼ 약세 (Bear)</div><div class="sd">${scn.bear||'-'}</div></div>
    </div>`;
  const newsHtml = `<ul class="news">${(it.news||[]).map(n=>`<li><a href="${n.u}" target="_blank" rel="noopener">${n.t} <span class="ext">↗</span></a><div class="nd">${n.d}</div></li>`).join('')}</ul>`;
  document.getElementById('detail-body').innerHTML = `
    <div class="d-head">
      <div><div class="d-name">${it.name}</div><div class="d-code">${code} · ${s.market||''}</div></div>
      <div class="d-badge"><div class="d-verdict ${kLabel.cls}">${kLabel.txt}</div>
        <div class="d-tgt">${g.targetPct||''}<small>${isBuy?'1년':'3개월'} 기대 · 종합 ${it.score}점</small></div></div>
    </div>

    <div class="guide">
      <div class="panel-t" style="margin-bottom:12px">💵 매매 가이드</div>
      <div class="guide-row">
        <div class="guide-c"><div class="gk">현재가</div><div class="gv">${g.current||'-'}</div></div>
        <div class="guide-c"><div class="gk">목표 매도가</div><div class="gv tg">${g.target||'-'}</div></div>
        <div class="guide-c"><div class="gk">보유 기간</div><div class="gv" style="font-size:14px">${g.hold||'-'}</div></div>
        <div class="guide-c"><div class="gk">손절선</div><div class="gv sl">${g.stopLoss||'-'}</div></div>
      </div>
      <div class="guide-rule">📌 ${g.rule||''}</div>
    </div>

    <div class="panel"><div class="panel-t">투자 논거</div><div class="thesis">${it.thesis}</div>
      <div class="risk"><b>리스크</b> · ${it.risk}</div></div>

    <div class="panel"><div class="panel-t">5년 주가 · 거래량 <span style="color:var(--ink-faint);font-weight:400;font-size:11px">· 차트에 마우스를 올리면 상세값 표시</span></div>
      <div class="chart-box"><canvas id="cP"></canvas></div>
      <div class="chart-box vol"><canvas id="cV"></canvas></div></div>

    <div style="margin-top:4px">
      ${acc('💰','저평가도 (Value)', `<p>${d.valuation||''}</p>`, true)}
      ${acc('📈','모멘텀 · 기술 분석', `<p style="margin-bottom:12px">${d.momentum||''}</p>${metricsHtml}`, false)}
      ${acc('🏦','재무 건전성', `<p>${d.finance||''}</p>`, false)}
      ${acc('🚀','상승 호재 · 촉매', `<p>${(d.catalyst||'').replace(/ ?(②|③)/g,'<br>$1')}</p>`, false)}
      ${acc('🎯','시나리오 (1년/3개월 목표 구간)', scnHtml, false)}
      ${acc('📰','관련 뉴스 (제목 클릭 → 기사)', newsHtml, false)}
    </div>
  `;
  document.getElementById('disc2').textContent = DISC;
  showView('view-detail');
  setTimeout(()=>drawCharts(code),60);
}
function drawCharts(code){
  const oh = REPORT.ohlcv[code]||[]; const light = document.documentElement.getAttribute('data-theme')==='light';
  const grid = light?'#E2E7EF':'#222B38'; const tk=light?'#5A6677':'#7C8696';
  const labels=oh.map(p=>'20'+p.d.slice(0,2)+'.'+p.d.slice(2,4)+'.'+p.d.slice(4,6)); const price=oh.map(p=>p.c); const vol=oh.map(p=>p.v);
  if(chartP)chartP.destroy(); if(chartV)chartV.destroy();
  const tipBase={enabled:true,backgroundColor:light?'#fff':'#1B232F',titleColor:light?'#16202E':'#E8EDF4',bodyColor:light?'#41506A':'#AEB8C7',borderColor:'#5BA8FF',borderWidth:1,padding:10,displayColors:false};
  const inter={mode:'index',intersect:false};
  chartP=new Chart(document.getElementById('cP'),{type:'line',data:{labels,datasets:[{label:'종가',data:price,borderColor:'#5BA8FF',backgroundColor:'rgba(91,168,255,.10)',borderWidth:1.8,fill:true,pointRadius:0,pointHoverRadius:4,pointHoverBackgroundColor:'#5BA8FF',tension:.12}]},
    options:{responsive:true,maintainAspectRatio:false,interaction:inter,plugins:{legend:{display:false},tooltip:{...tipBase,callbacks:{title:c=>c[0].label,label:c=>'종가  '+c.parsed.y.toLocaleString()+'원'}}},scales:{x:{ticks:{color:tk,maxTicksLimit:8,font:{size:10}},grid:{display:false}},y:{position:'right',ticks:{color:tk,font:{size:10},callback:v=>(v/10000).toFixed(0)+'만'},grid:{color:grid}}}}});
  chartV=new Chart(document.getElementById('cV'),{type:'bar',data:{labels,datasets:[{label:'거래량',data:vol,backgroundColor:light?'rgba(120,140,170,.5)':'rgba(124,134,150,.5)',hoverBackgroundColor:'#5BA8FF'}]},
    options:{responsive:true,maintainAspectRatio:false,interaction:inter,plugins:{legend:{display:false},tooltip:{...tipBase,callbacks:{title:c=>c[0].label,label:c=>'거래량  '+c.parsed.y.toLocaleString()+'주'}}},scales:{x:{display:false},y:{position:'right',ticks:{color:tk,font:{size:9},maxTicksLimit:3,callback:v=>(v/1000000).toFixed(0)+'M'},grid:{color:grid}}}}});
}
function applyTheme(t){ document.documentElement.setAttribute('data-theme',t); document.getElementById('themeBtn').textContent=t==='light'?'☀️':'🌙'; try{localStorage.setItem('sr-theme',t)}catch(e){}
  if(document.getElementById('view-detail').classList.contains('active') && curCode){ drawCharts(curCode); } }
function toggleTheme(){ applyTheme(document.documentElement.getAttribute('data-theme')==='light'?'dark':'light'); }
document.addEventListener('DOMContentLoaded',()=>{ let t=null; try{t=localStorage.getItem('sr-theme')}catch(e){} applyTheme(t||'dark'); renderHome(); });
</script>
